name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, zip
          tools: composer:v2

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader

      - name: Create plugin directory
        run: |
          # Save built assets out of the way before creating the plugin tree
          mkdir -p /tmp/gratis-build
          cp build/*.js build/*.css build/*.asset.php /tmp/gratis-build/ 2>/dev/null || true
          cp build/*.map /tmp/gratis-build/ 2>/dev/null || true

          mkdir -p dist/gratis-ai-agent/build

          # Copy PHP files
          cp gratis-ai-agent.php dist/gratis-ai-agent/
          cp -r includes dist/gratis-ai-agent/
          cp -r stubs dist/gratis-ai-agent/ 2>/dev/null || true

          # Copy built assets
          cp /tmp/gratis-build/* dist/gratis-ai-agent/build/ 2>/dev/null || true

          # Copy other assets
          cp -r assets dist/gratis-ai-agent/ 2>/dev/null || true
          cp -r languages dist/gratis-ai-agent/ 2>/dev/null || true

          # Copy vendor (production only)
          cp -r vendor dist/gratis-ai-agent/

          # Copy documentation
          cp README.md dist/gratis-ai-agent/
          cp readme.txt dist/gratis-ai-agent/
          cp LICENSE dist/gratis-ai-agent/

      - name: Create ZIP files
        run: |
          cd dist
          zip -r ../gratis-ai-agent-${{ steps.version.outputs.VERSION }}.zip gratis-ai-agent -x "*.DS_Store" -x "*.git*"
          # Stable-name zip so playground blueprints can reference /releases/latest/download/
          cp ../gratis-ai-agent-${{ steps.version.outputs.VERSION }}.zip ../gratis-ai-agent.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gratis-ai-agent-${{ steps.version.outputs.VERSION }}.zip
            gratis-ai-agent.zip
          name: Gratis AI Agent v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  update-blueprints:
    name: Update blueprint refs to new tag
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Update blueprint tag refs
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BLUEPRINT=".wordpress-org/blueprints/blueprint.json"

          # Update the gratis-ai-agent ref (only the entry matching our repo URL)
          jq --arg tag "$TAG" '
            .steps |= map(
              if .step == "installPlugin"
                 and .pluginData.inner.url == "https://github.com/Ultimate-Multisite/gratis-ai-agent"
              then .pluginData.inner.ref = $tag
              else .
              end
            )
          ' "$BLUEPRINT" > "${BLUEPRINT}.tmp" && mv "${BLUEPRINT}.tmp" "$BLUEPRINT"

      - name: Commit and push
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .wordpress-org/blueprints/blueprint.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update blueprint ref to ${TAG} [skip ci]"
          git push
